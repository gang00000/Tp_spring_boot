<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${article.title}">Détail Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Accueil</a></li>
            <li class="breadcrumb-item"><a href="/blog">Blog</a></li>
            <li class="breadcrumb-item active" th:text="${article.title}"></li>
        </ol>
    </nav>

    <div th:if="${article != null}">
        <h1 th:text="${article.title}"></h1>
        <hr>
        <p class="lead" th:text="${article.content}"></p>

        <h3 class="mt-5">Commentaires</h3>
        <div th:each="c : ${article.comments}" class="card mb-2">
            <div class="card-body">
                <p class="card-text" th:text="${c.text}"></p>
                <footer class="blockquote-footer" th:text="${c.author}"></footer>
            </div>
        </div>

        <div class="mt-4 card p-3">
            <h5>Ajouter un commentaire</h5>
            <form th:action="@{'/blog/' + ${article.id} + '/comment'}" th:object="${newComment}" method="post">
                <div class="mb-3">
                    <label class="form-label">Auteur</label>
                    <input type="text" th:field="*{author}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea th:field="*{text}" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Envoyer</button>
            </form>
        </div>
    </div>
</body>
</html>
