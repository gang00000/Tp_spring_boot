<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifier le Produit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Accueil</a></li>
            <li class="breadcrumb-item"><a href="/products">Produits</a></li>
            <li class="breadcrumb-item active">Modifier</li>
        </ol>
    </nav>

    <h1>Modifier le Produit</h1>

    <div class="col-md-6 mt-4">
        <form th:action="@{'/products/' + ${product.id} + '/edit'}" th:object="${product}" method="post" class="card p-4">
            <div class="mb-3">
                <label class="form-label">Nom <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}"
                       th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'">
                <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Prix <span class="text-danger">*</span></label>
                <input type="number" step="0.01" th:field="*{price}"
                       th:class="${#fields.hasErrors('price')} ? 'form-control is-invalid' : 'form-control'">
                <div class="invalid-feedback" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}"
                          th:class="${#fields.hasErrors('description')} ? 'form-control is-invalid' : 'form-control'"></textarea>
                <div class="invalid-feedback" th:errors="*{description}"></div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">💾 Sauvegarder</button>
                <a href="/products" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</body>
</html>
