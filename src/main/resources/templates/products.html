<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des Produits</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Accueil</a></li>
            <li class="breadcrumb-item active">Produits</li>
        </ol>
    </nav>

    <h1>Catalogue de Produits</h1>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mt-4">
        <div class="col-md-4">
            <h3>Ajouter un Produit</h3>
            <form th:action="@{/products/add}" th:object="${newProduct}" method="post" class="card p-3">
                <div class="mb-3">
                    <label class="form-label">Nom <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}"
                           th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Prix <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" th:field="*{price}"
                           th:class="${#fields.hasErrors('price')} ? 'form-control is-invalid' : 'form-control'">
                    <div class="invalid-feedback" th:errors="*{price}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}"
                              th:class="${#fields.hasErrors('description')} ? 'form-control is-invalid' : 'form-control'"></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </form>
        </div>
        <div class="col-md-8">
            <h3>Liste des Produits</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.price} + ' €'"></td>
                        <td th:text="${p.description}"></td>
                        <td>
                            <a th:href="@{'/products/' + ${p.id} + '/edit'}" class="btn btn-sm btn-warning">✏️</a>
                            <form th:action="@{'/products/' + ${p.id} + '/delete'}" method="post" class="d-inline"
                                  onsubmit="return confirm('Supprimer ce produit ?')">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
