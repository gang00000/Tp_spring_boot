<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Erreur</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="text-center mt-5">
        <h1 class="display-1 text-danger" th:text="${errorCode} ?: '500'">500</h1>
        <h2 class="mb-4">Une erreur s'est produite</h2>
        <p class="lead text-muted" th:text="${errorMessage} ?: 'Erreur interne du serveur'">Message d'erreur</p>
        <a href="/" class="btn btn-primary mt-3">⬅ Retour à l'accueil</a>
    </div>
</body>
</html>
